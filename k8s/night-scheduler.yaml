# --- Night Scheduler: Scale Down at Night (Save 40-60%) ---
# Scales deployments to 0 replicas from 10 PM to 8 AM IST
# Saves compute cost during off-hours

apiVersion: batch/v1
kind: CronJob
metadata:
  name: scale-down-night
  namespace: dev
spec:
  # 10:00 PM IST = 4:30 PM UTC
  schedule: "30 16 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: scheduler-sa
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "⏬ Scaling down all deployments..."
                  kubectl scale deployment --all --replicas=0 -n dev
                  kubectl scale deployment --all --replicas=0 -n test
                  echo "✅ All deployments scaled to 0"
          restartPolicy: OnFailure

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scale-up-morning
  namespace: dev
spec:
  # 8:00 AM IST = 2:30 AM UTC
  schedule: "30 2 * * 1-5"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: scheduler-sa
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "⬆️ Scaling up deployments..."
                  kubectl scale deployment stackflow-backend --replicas=1 -n dev
                  kubectl scale deployment stackflow-frontend --replicas=1 -n dev
                  kubectl scale deployment stackflow-backend --replicas=2 -n test
                  kubectl scale deployment stackflow-frontend --replicas=2 -n test
                  echo "✅ All deployments scaled up"
          restartPolicy: OnFailure

---
# Service account for scheduler
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scheduler-sa
  namespace: dev

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: deployment-scaler
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: scheduler-binding
subjects:
  - kind: ServiceAccount
    name: scheduler-sa
    namespace: dev
roleRef:
  kind: ClusterRole
  name: deployment-scaler
  apiGroup: rbac.authorization.k8s.io
