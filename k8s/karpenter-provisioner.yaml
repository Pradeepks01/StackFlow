# karpenter provisioner - spot first strategy
# replaces cluster autoscaler, way faster at launching nodes

apiVersion: karpenter.sh/v1alpha5
kind: Provisioner
metadata:
  name: stackflow-spot
  namespace: kube-system
spec:
  requirements:
    - key: karpenter.sh/capacity-type
      operator: In
      values: ["spot", "on-demand"]
    - key: node.kubernetes.io/instance-type
      operator: In
      values:
        - t4g.small
        - t4g.medium
        - t3a.small
        - t3a.medium
        - t3.small
        - t3.medium
    - key: topology.kubernetes.io/zone
      operator: In
      values:
        - ap-south-1a
        - ap-south-1b
  consolidation:
    enabled: true
  ttlSecondsAfterEmpty: 30
  ttlSecondsUntilExpired: 86400  # recycle nodes daily
  limits:
    resources:
      cpu: "8"
      memory: "16Gi"
  providerRef:
    name: stackflow-provider

---
apiVersion: karpenter.k8s.aws/v1alpha1
kind: AWSNodeTemplate
metadata:
  name: stackflow-provider
  namespace: kube-system
spec:
  subnetSelector:
    karpenter.sh/discovery: stackflow-cluster
  securityGroupSelector:
    karpenter.sh/discovery: stackflow-cluster
  amiFamily: AL2
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 20Gi
        volumeType: gp3
        deleteOnTermination: true
