name: StackFlow CI/CD Pipeline

on:
  push:
    branches: [ devops, test, main ]
  pull_request:
    branches: [ devops, test, main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for pushing changes back to the repo
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Environment Variables
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" == "test" ]; then
            echo "ENV_NAME=test" >> $GITHUB_ENV
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/stackflow-backend:$IMAGE_TAG ./app/backend

      - name: Build Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/stackflow-frontend:$IMAGE_TAG ./app/frontend

      - name: Security Scan - Backend (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/stackflow-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Security Scan - Frontend (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/stackflow-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/stackflow-backend:$IMAGE_TAG

      - name: Push Frontend to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/stackflow-frontend:$IMAGE_TAG

      - name: Update Helm Version (GitOps)
        run: |
          IMAGE_TAG=${{ github.sha }}
          ENV_FILE="./helm/stackflow/values-${{ env.ENV_NAME }}.yaml"
          
          # Update tags in the environment specific values file
          sed -i "s/tag: .*/tag: \"$IMAGE_TAG\"/g" $ENV_FILE
          
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add $ENV_FILE
          git commit -m "chore: update $ENV_NAME image tag to $IMAGE_TAG" || echo "No changes to commit"
          git push origin ${{ github.ref_name }}
