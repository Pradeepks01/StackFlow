apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stackflow-dev
  namespace: argocd
  labels:
    environment: dev
spec:
  project: default
  source:
    repoURL: https://github.com/Pradeepks01/StackFlow.git
    targetRevision: devops
    path: helm/stackflow
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
