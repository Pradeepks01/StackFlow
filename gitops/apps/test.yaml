apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stackflow-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/stackflow.git
    targetRevision: test
    path: helm/stackflow
    helm:
      valueFiles:
        - values.yaml
        - values-test.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
