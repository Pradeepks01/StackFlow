apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stackflow-test
  namespace: argocd
  labels:
    environment: test
    strategy: canary
spec:
  project: default
  source:
    repoURL: https://github.com/Pradeepks01/StackFlow.git
    targetRevision: test
    path: helm/stackflow
    helm:
      valueFiles:
        - values.yaml
        - values-test.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 3m
