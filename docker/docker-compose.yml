version: '3.8'

services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: stackflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: StrongPass123
      POSTGRES_DB: stackflow
    ports:
      - "5432:5432"
    volumes:
      - ../database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d stackflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    tmpfs:
      - /tmp
      - /run

  # ---- Backend API ----
  backend:
    build:
      context: ../app/backend
      dockerfile: Dockerfile
    container_name: stackflow-backend
    restart: unless-stopped
    environment:
      PORT: "5000"
      DB_USER: admin
      DB_PASSWORD: StrongPass123
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: stackflow
      NODE_ENV: production
      LOG_LEVEL: info
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # ---- Frontend (Nginx + React) ----
  frontend:
    build:
      context: ../app/frontend
      dockerfile: Dockerfile
    container_name: stackflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true

  # ---- Prometheus ----
  prometheus:
    image: prom/prometheus:latest
    container_name: stackflow-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    ports:
      - "9090:9090"
    security_opt:
      - no-new-privileges:true

  # ---- Grafana ----
  grafana:
    image: grafana/grafana:latest
    container_name: stackflow-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
    driver: local
